<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#7C3AED" />
  <title>WordSnap — Open in Telegram</title>
  <style>
    :root {
      color-scheme: dark;
      --violet: #7C3AED;
      --pink: #EC4899;
      --bg: #0B0610;
      --card: rgba(255,255,255,0.06);
      --text: #ffffff;
      --text-2: rgba(255,255,255,0.7);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(124,58,237,0.35) 0%, transparent 55%),
        radial-gradient(circle at 80% 80%, rgba(236,72,153,0.30) 0%, transparent 50%);
    }
    .wrap {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .logo {
      width: 72px; height: 72px;
      margin: 0 auto 18px;
      border-radius: 22px;
      background: linear-gradient(135deg, var(--violet) 0%, var(--pink) 100%);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 36px; color: #fff;
      box-shadow: 0 10px 30px rgba(124,58,237,0.45);
      letter-spacing: -1px;
    }
    h1 {
      font-size: 28px; font-weight: 800; margin: 0 0 8px;
      letter-spacing: -0.5px;
    }
    .sub {
      color: var(--text-2); font-size: 15px;
      margin: 0 0 28px; line-height: 1.5;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 10px;
      width: 100%; max-width: 320px;
      padding: 16px 22px;
      background: linear-gradient(135deg, var(--violet) 0%, var(--pink) 100%);
      color: #fff;
      font-weight: 700; font-size: 16px;
      text-decoration: none;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(124,58,237,0.45);
      transition: transform 0.12s, box-shadow 0.2s;
    }
    .btn:active { transform: scale(0.97); }
    .btn svg { width: 22px; height: 22px; }
    .hint {
      margin-top: 18px;
      color: var(--text-2); font-size: 13px; line-height: 1.5;
    }
    .hint code {
      background: var(--card); padding: 2px 6px; border-radius: 4px;
      font-size: 12px; color: var(--text);
    }
    .pulse {
      display: inline-block; width: 8px; height: 8px;
      background: #84CC16; border-radius: 50%;
      margin-right: 6px;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.35; transform: scale(0.85); }
      50%      { opacity: 1;    transform: scale(1.15); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">W</div>
    <h1>WordSnap</h1>
    <p class="sub">Слова з життя за кордоном. Snap - SRS поверне у пам'ять.</p>
    <!-- Real <a href> (НЕ button + JS). Tap по справжньому посиланню на iOS
         Safari iOS обробляє як user gesture - тоді Universal Link
         `t.me/<bot>/app` тихо відкриває нативний Telegram БЕЗ системного
         dialog'у. Через `window.location.href = ...` (auto-redirect) той
         самий лінк НЕ дає silent launch - iOS просто навігує на t.me-web
         сторінку, яка вже сама показує dialog. Тому: один тап, один лінк. -->
    <a id="cta" class="btn" href="#" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M9.04 16.6l-.36 5.05c.51 0 .73-.22.99-.48l2.38-2.27 4.93 3.6c.9.5 1.55.24 1.79-.83l3.25-15.2v-.01c.28-1.34-.48-1.86-1.36-1.54L1.13 9.7C-.18 10.2-.15 10.93.9 11.25l4.85 1.51 11.27-7.1c.53-.34 1.02-.16.62.21" />
      </svg>
      Відкрити у Telegram
    </a>
    <p class="hint">Не маєте Telegram? <a href="https://telegram.org/" style="color:#A78BFA;">Завантажте</a> - займе хвилину.</p>
  </div>

  <!-- PostHog snippet (EU host). Async load — never blocks the page. -->
  <script>
    !function(t,e){var o,n,p,r;e.__SV||(window.posthog=e,e._i=[],e.init=function(i,s,a){function g(t,e){var o=e.split(".");2==o.length&&(t=t[o[0]],e=o[1]),t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments,0)))}}(p=t.createElement("script")).type="text/javascript",p.async=!0,p.src=s.api_host+"/static/array.js",(r=t.getElementsByTagName("script")[0]).parentNode.insertBefore(p,r);var u=e;for(void 0!==a?u=e[a]=[]:a="posthog",u.people=u.people||[],u.toString=function(t){var e="posthog";return"posthog"!==a&&(e+="."+a),t||(e+=" (stub)"),e},u.people.toString=function(){return u.toString(1)+".people (stub)"},o="capture identify alias people.set people.set_once set_config register register_once unregister opt_out_capturing has_opted_out_capturing opt_in_capturing reset isFeatureEnabled onFeatureFlags getFeatureFlag getFeatureFlagPayload reloadFeatureFlags group updateEarlyAccessFeatureEnrollment getEarlyAccessFeatures getActiveMatchingSurveys getSurveys getNextSurveyStep onSessionId".split(" "),n=0;n<o.length;n++)g(u,o[n]);e._i.push([i,s,a])},e.__SV=1)}(document,window.posthog||[]);
    posthog.init('phc_nUWid6hPkYMGNSKQh2t3N4jHxM2ZAEvq3ctHZneY7pLE', {
      api_host: 'https://eu.posthog.com',
      capture_pageview: false,
      autocapture: false,
      persistence: 'localStorage',
      disable_session_recording: true
    });
  </script>

  <script>
    (function () {
      const PH_KEY = 'phc_nUWid6hPkYMGNSKQh2t3N4jHxM2ZAEvq3ctHZneY7pLE';
      const PH_HOST = 'https://eu.posthog.com';

      // 1. Parse cohort tag
      const params = new URLSearchParams(window.location.search);
      const ref = (params.get('ref') || params.get('startapp') || '').trim();
      const BOT = 'WordSnapBot';
      const APP = 'app';
      const ua = navigator.userAgent || '';
      const isIgInApp = /Instagram/i.test(ua);
      const isFbInApp = /FBAN|FBAV|FB_IAB/i.test(ua);
      const isIOS = /iPhone|iPad|iPod/i.test(ua);
      const isAndroid = /Android/i.test(ua);

      // 2. Build URLs
      const httpsUrl = ref
        ? `https://t.me/${BOT}/${APP}?startapp=${encodeURIComponent(ref)}`
        : `https://t.me/${BOT}/${APP}`;
      const tgUrl = ref
        ? `tg://resolve?domain=${BOT}&appname=${APP}&startapp=${encodeURIComponent(ref)}`
        : `tg://resolve?domain=${BOT}&appname=${APP}`;

      // 3. Stable anon distinct_id across all beacon events on this page.
      //    Reuse posthog-js's localStorage so subsequent capture() calls (if the
      //    lib finishes loading) and our beacons stitch into the same person.
      function uuid() {
        try { if (crypto && crypto.randomUUID) return crypto.randomUUID(); } catch (e) {}
        return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
          (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16)
        );
      }
      const PH_LS_KEY = `ph_${PH_KEY}_posthog`;
      let distinctId = null;
      try {
        const raw = localStorage.getItem(PH_LS_KEY);
        if (raw) distinctId = (JSON.parse(raw) || {}).distinct_id || null;
      } catch (e) {}
      if (!distinctId) {
        distinctId = uuid();
        try { localStorage.setItem(PH_LS_KEY, JSON.stringify({ distinct_id: distinctId })); } catch (e) {}
      }

      // 4. Super-props that piggyback onto every beacon (and posthog.register
      //    for any later same-session events that DO go through posthog-js).
      const ref_idx = ref ? ref.indexOf('_') : -1;
      const acquisition_source   = ref ? (ref_idx === -1 ? ref : ref.slice(0, ref_idx)) : null;
      const acquisition_campaign = ref && ref_idx !== -1 ? ref.slice(ref_idx + 1) : null;
      const superProps = {
        ref: ref || null,
        ig_in_app: isIgInApp,
        fb_in_app: isFbInApp,
        ios: isIOS,
        android: isAndroid,
        acquisition_source,
        acquisition_campaign,
        acquisition_raw: ref || null,
      };
      try { posthog.register(superProps); } catch (e) {}
      try { posthog.identify(distinctId); } catch (e) {}

      // 5. beaconCapture — fire-and-forget POST that survives page unload.
      //    Primary path so a fast-bouncer who closes the tab in <250ms still
      //    leaves us a `landing_visited`. We deliberately do NOT also call
      //    posthog.capture() for the same event to avoid double-counting.
      function beaconCapture(event, extraProps) {
        const props = Object.assign({}, superProps, extraProps || {});
        const payload = {
          api_key: PH_KEY,
          event,
          distinct_id: distinctId,
          properties: props,
          timestamp: new Date().toISOString(),
        };
        const body = JSON.stringify(payload);
        try {
          if (navigator.sendBeacon) {
            const blob = new Blob([body], { type: 'application/json' });
            if (navigator.sendBeacon(`${PH_HOST}/e/`, blob)) return;
          }
        } catch (e) {}
        // Fallback: keepalive fetch (also survives unload on modern browsers)
        try {
          fetch(`${PH_HOST}/e/`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body,
            keepalive: true,
            mode: 'no-cors',
          });
        } catch (e) {}
      }

      // 6. Fire landing_visited ASAP — точка №1 у воронці. Beacon переживає
      //    закриття вкладки за <100мс.
      beaconCapture('landing_visited');

      // 7. visibilitychange → hidden = сильний сигнал що Telegram дійсно
      //    відкрився (page активність втрачена).
      let fired = false;
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden' && !fired) {
          fired = true;
          beaconCapture('tg_app_likely_opened');
        }
      });

      // 8. CTA href = universal link. У ВСІХ контекстах тап по справжньому
      //    <a href> дає кращий результат: на iOS Safari/Chrome user gesture
      //    → silent universal-link launch; на macOS Safari → відкриється
      //    desktop-TG (з неминучим dialog'ом — це OS-rule, не наш баг).
      const cta = document.getElementById('cta');
      cta.href = httpsUrl;
      cta.addEventListener('click', () => {
        beaconCapture('tg_open_clicked', { method: 'manual_tap' });
        // У Meta/FB in-app browser universal link БЛОКУЄТЬСЯ. Якщо за 1500мс
        // page ще видима → IAB не спрацював, тригер tg:// як fallback.
        // У звичайному Safari ця гілка не виконається — нав'юкався вже.
        if (isIgInApp || isFbInApp) {
          setTimeout(() => {
            if (document.visibilityState === 'visible') {
              beaconCapture('tg_open_clicked', { method: 'tg_scheme_iab' });
              try { window.location.href = tgUrl; } catch (e) {}
            }
          }, 1500);
        }
      });

      // 9. Meta/FB IAB auto-redirect: юзер прийшов з реклами в Instagram/FB.
      //    КРИТИЧНО: шлемо на `httpsUrl` (universal link), НЕ на `tgUrl`
      //    (custom scheme). Причина — на iOS Telegram `tg://resolve?domain=
      //    BOT&appname=app&startapp=X` ВТРАЧАЄ `startapp` параметр: mini-app
      //    відкривається, але `tg.initDataUnsafe.start_param` приходить як
      //    undefined → атрибуція ламається → юзер тагається 'organic'
      //    замість 'igads/val_2605_v2'. Підтверджено даними: 25 OS-handoff'ів
      //    і лише ~2 в cohort з 6 годин (95% губимо).
      //
      //    Universal link на t.me у IAB не дає silent open — буде t.me-web
      //    сторінка з кнопкою «OPEN APP», +1 тап. Але `startapp=X` Telegram-
      //    router зберігає, бо саме він обробляє свої universal links.
      //    Trade-off: +1 тап ціна; -95% втрата атрибуції закриваємо.
      if (isIgInApp || isFbInApp) {
        setTimeout(() => {
          if (fired) return;
          beaconCapture('tg_auto_redirect_attempted', { stage: 'iab_universal_link' });
          try { window.location.href = httpsUrl; } catch (e) {}
        }, 800);
      }
    })();
  </script>
</body>
</html>

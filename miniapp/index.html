<html lang="en">

    <meta name="color-scheme" content="light dark" />

    <!-- Welcome story для новачків — вантажиться вперед main bundle -->
    <link rel="preload" as="image" href="/onboarding/slide_1.png" fetchpriority="high" />

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
